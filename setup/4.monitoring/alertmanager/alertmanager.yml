global:
  resolve_timeout: 5m

route:
  receiver: "default-receiver"
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h

receivers:
  - name: "default-receiver"
    email_configs:
      - to: "devops@eu.com"
        from: "alertmanager@eu.com"
        smarthost: "smtp.eu.com:587"
        auth_username: "alertmanager@eu.com"
        auth_password: "SECRET_PASSWORD"
