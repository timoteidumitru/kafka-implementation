services:
  order-service:
    build: ../../order-service
    container_name: order-service
    ports:
      - "8081:8081"
    networks:
      - kafka-network
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_SERVER: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/orders_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: prometheus,health
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"

  payment-service:
    build: ../../payment-service
    container_name: payment-service
    ports:
      - "8082:8082"
    networks:
      - kafka-network
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_SERVER: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/payments_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: prometheus,health
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"

  notification-service:
    build: ../../notification-service
    container_name: notification-service
    ports:
      - "8083:8083"
    networks:
      - kafka-network
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_SERVER: http://eureka-server:8761/eureka
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: prometheus,health
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"

  inventory-service:
    build: ../../inventory-service
    container_name: inventory-service
    ports:
      - "8084:8084"
    networks:
      - kafka-network
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_SERVER: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/inventory_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: prometheus,health
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"

networks:
  kafka-network:
    external: true
